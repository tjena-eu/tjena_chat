server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation: required for SharedArrayBuffer in Firefox,
    # which vodozemac's WASM (compiled with atomics) depends on.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    # Allow the Matrix homeserver and other cross-origin media to load
    # despite COEP require-corp (the homeserver must also send CORP headers;
    # see Synapse's content_security_policy / cors config).
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|wasm|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }
}
